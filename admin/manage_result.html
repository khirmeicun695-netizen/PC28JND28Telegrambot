<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>开奖管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="js/layui-v2.6.3/css/layui.css" media="all">
    <link rel="stylesheet" href="css/public.css" media="all">
</head>
<body>
<div class="layuimini-container">
    <div class="layuimini-main">

        <fieldset class="table-search-fieldset">
            <legend>搜索信息</legend>
            <div style="margin: 10px 10px 10px 10px">
                <div class="layui-form-item">
                    <div class="layui-inline">
                		
                        <label class="layui-form-label" style="margin: 0;padding: 0;height: 42px;border: none;width: 100px;">
                			
                			<button class="layui-btn" id="tabs">
                				<p id="tabs-text" style="text-align: center;"></p>
                				 <!--i class="layui-icon layui-icon-down layui-font-12"></i-->
                			</button>
                		</label>
                        <div class="layui-input-inline">
                            <input type="text" id="input_value" autocomplete="off" class="layui-input" placeholder="请输入关键词">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <button class="layui-btn layui-btn-primary"  lay-submit lay-filter="data-search-btn"><i class="layui-icon"></i> 搜 索</button>
                    </div>
                </div>
            </div>
        </fieldset>
        
        <table class="layui-hide" id="currentTableId" lay-filter="currentTableFilter"></table>


    </div>
</div>

<script src="js/layui-v2.6.3/layui.js" charset="utf-8"></script>
<script src="js/jquery.min.js"></script>
<script src="js/jquery.cookie.js"></script>
<script src="config.js"></script>
<script>
var type = "开奖期号";
var typeName = "id";
var checkSum = 0;//初始化选中数量
var data = [];
var selectData = []; //选中的数据
var isSelectAll = false; //是否选择了全选按钮
var session = $.cookie('session');
var id = $.cookie('id');
var name = $.cookie('name');
var userinfo = {};
var alert; 

	/*加载事件*/
	$(function () {
		$("#tabs-text").text(type); //添加默认标签
		$.ajax({
			type:"get",
			url: url+"/table/result",
			async:false,
			data:{
				"cookie":$.cookie('session')
			},
			success:function(msg){
				data = msg.data;
				layui.use(['form', 'table'])
			},
			error:function(err){
				layer.msg('登录过期，请刷新主页后重新登录！');
			}
		})
	});
	
	
	
	/*配置搜索选项*/
	layui.use('dropdown', function(){
	  var dropdown = layui.dropdown
	  dropdown.render({
	    elem: '#tabs' //可绑定在任意元素中，此处以上述按钮为例
	    ,data: [{
	      title: '开奖期号',
		  name:"id"
	    }]
	    ,id: 'tabs'
	    //菜单被点击的事件
	    ,click: function(obj){
		  type = obj.title;
		  typeName = obj.name;
		  $("#tabs-text").text(type)
	    }
	  });
	});
	/*表格配置*/
	layui.use(['form', 'table'], function () {
	    var form = layui.form;
	    var table = layui.table;
		var laydate = layui.laydate;
		//日期
		
  
	    table.render({
	        elem: '#currentTableId',
	        data:data,
	        toolbar: '#toolbarDemo',
			title:"开奖记录表",
			text: {
			    none: '暂无相关数据' //默认：无数据。
			},
			defaultToolbar: ['filter', 'exports', 'print'],
	        cols: [[
				{field: 'id', title: '开奖期号', sort: true},
				{field: 'one', title: '百位', sort: true},
				{field: 'two', title: '十位'},
				{field: 'three', title: '个位', sort: true},
				{field: 'result_time', title: '开奖时间', sort: true}
	        ]],
	        limits: [10, 15, 20, 25, 50, 100],
	        limit: 10,
	        page: true,
	        skin: 'line'
	    });
	
	    // 监听搜索操作
	    form.on('submit(data-search-btn)', function (res) {
	    	table.reload('currentTableId',{
	    		url: `${url}/table/result/search?cookie=${$.cookie('session')}&key=${typeName}&value=${$('#input_value').val()}`
	    	}, true)
	    });
	
	    /*选择框监听事件*/
	    table.on('toolbar(currentTableFilter)', function (obj) {
			/*判断是否已经选择*/
			if(selectData.length==0){
				if(obj.event=="delete"){
					layer.msg('选择为空！');
					return;
				}
			}
			/*选择框监听“添加用户”操作*/
	        if (obj.event === 'add') {  
	             alert = layer.alert(`<div class="layui-form" style="margin-top: 30px;width: auto;">
					<div class="layui-form-item">
	            		<label class="layui-form-label" style="width: 60px !important;">试剂ID</label>
	            		<div class="layui-input-block" style="margin-left: 90px !important;">
	            			<select name="唯一的试剂序列号" id="唯一的试剂序列号" lay-verify="required" lay-search="" lay-verify="required" lay-reqtext="试剂ID不能为空">
	            			  <option value=""></option>
	            			</select>
	            		</div>
	            	</div>
					<div class="layui-form-item">
	            		<label class="layui-form-label" style="width: 60px !important;">采购数量</label>
	            		<div class="layui-input-block" style="margin-left: 90px !important;">
	            			<input type="text" name="购买数量" id="购买数量" lay-verify="number" lay-reqtext="采购数量不能为空" placeholder="请输入采购数量" value="" class="layui-input" >
	            		</div>
	            	</div>
	            	<div class="layui-form-item">
						<label class="layui-form-label" style="width: 60px !important;">采购时间</label>
						<div class="layui-input-block" style="margin-left: 90px !important;">
							<input type="text" name="购买日期时间" id="购买日期时间" lay-verify="datetime" lay-reqtext="采购时间不能为空" placeholder="请选择采购时间" class="layui-input">
						</div>
					</div>
	            	<div class="layui-form-item">
	            		<div class="layui-input-block" style="margin-left: 0px !important;display: flex;justify-content: center;">
	            			<button class="layui-btn layui-btn-normal" lay-submit lay-filter="saveBtn">确认</button>
	            		</div>
	            	</div>
	            </div>`
	            , {
	            	area: ['100%', '100%'],
	                skin: 'layui-layer-lan',
	                closeBtn: 1,
	            	btn:[],
	            	title:"添加采购记录",
	            	success(){
						laydate.render({
						  elem: '#购买日期时间',
						  type:"datetime"
						});
						$.ajax({
							type:"get",
							url: url+"/Reagent",
							data:{
								"cookie":$.cookie('session')
							},
							success:function(msg){
								var ReagentInfo = msg.data;
								for (var i = 0; i < ReagentInfo.length; i++) {
									$('#唯一的试剂序列号').append(`
										<option value="${ReagentInfo[i]['唯一的试剂序列号']}">${ReagentInfo[i]['唯一的试剂序列号']}</option>
									`)
								}
								form.render('select');
								
							},
							error:function(err){
								layer.msg('登录过期，请刷新主页后重新登录！');
							}
						})
	            	}
	            });
	            return false;
	        } else if (obj.event === 'delete') {  // 
			/*选择框监听删除操作*/
	            layer.confirm('您一共选择了'+selectData.length+'种试剂，请谨慎删除！' , 
				function(index){
					var deleteArray = "";
					for (var i = 0; i < selectData.length; i++) {
						if(i==selectData.length-1){
							deleteArray += parseInt(selectData[i]['采购号']);
						}else{
							deleteArray += parseInt(selectData[i]['采购号'])+',';
						}
					}
					$.ajax({
						type:"delete",
						url:url+"/Acquisitions",
						contentType:"json/application",
						dataType:"json",
						data:JSON.stringify({
							"cookie":session,
							"acquisitionsinfo":deleteArray,
						}),
						success:function(msg){
							if(msg.status==200){
								layer.msg("删除成功!");
							}else{
								layer.msg("删除失败!");
							}
						},
						error:function(err){
							if(err.status==200){
								layer.msg("删除成功!");
							}else{
								layer.msg("删除失败!");
							}
						},
						complete(){
							table.reload('currentTableId',{
								url: url+'/Acquisitions?cookie='+$.cookie('session')
							}, true)
							selectData = [];
						}
					})
					layer.close(index);
	            });
	        }
	    });
	
	    /*复选框选择逻辑处理*/
	    table.on('checkbox(currentTableFilter)', function (obj) {
			if (obj.type=="all" && isSelectAll==false) {
				isSelectAll = true;
				selectData=[];
				for (var i = 0; i < data.length; i++) {
					selectData.push(data[i]) 
				}
			}else if(obj.type=="all" && isSelectAll==true){
				isSelectAll =false;
				selectData = [];
			}else if(obj.type=="one" && obj.checked==true){
				selectData.push(obj.data);
				if(data.length==selectData.length){
					isSelectAll=true;
				}
			}else if(obj.type=="one" && obj.checked==false){
				if(data.length==selectData.length){
					isSelectAll=false;
				}
				for (var i = 0; i < selectData.length; i++) {
				  if (selectData[i]['工号']==obj.data['工号']){
				    selectData.splice(i, 1);
				  }
				}
			}
	    });
		
		layui.use(['form'], function () {
		    var form = layui.form;
		    var layer = layui.layer;
		    /*确认修改用户信息*/
		    form.on('submit(saveBtn)', function (data) {
				var acquisitionsinfo = data.field;
				acquisitionsinfo['购买日期时间']=acquisitionsinfo['购买日期时间'].replace(" ","T")
				acquisitionsinfo['唯一的试剂序列号']=parseInt(acquisitionsinfo['唯一的试剂序列号']);
				acquisitionsinfo['购买数量']=parseInt(acquisitionsinfo['购买数量']);
				$.ajax({
					type:"post",
					dataType:"json",
					url:url+"/Acquisitions",
					data:JSON.stringify({
						"acquisitionsinfo":acquisitionsinfo,
						"cookie":session
					}),
					success:function(msg){
						if(msg.status==200 || msg.status==204){
							layer.msg('添加成功！');
							table.reload('currentTableId', true);
						}else{
							layer.msg('添加失败！');
						}
					},
					error:function(err){
						if(err.status==200 || err.status==204){
							layer.msg('添加成功！');
						}else{
							layer.msg('添加失败！');
						}
					},
					complete(){
						table.reload('currentTableId',{
							url: url+'/Acquisitions?cookie='+$.cookie('session')
						}, true)
						selectData = [];
					}
				})
				layer.close(alert);
		        return false;
		    });
			
			/*添加新用户*/
			form.on('submit(saveNewUserBtn)', function (data) {
				var newUserinfo = data.field;
				newUserinfo['新密码'] = data.field['密码'];
				newUserinfo['身份证号'] = "null";
				$.ajax({
					type:"post",
					dataType:"json",
					url:url+"/userinfo",
					data:JSON.stringify({
						"userinfo":newUserinfo,
						"cookie":session
					}),
					success:function(msg){
						if(msg.status==200 || msg.status==204){
							layer.msg('添加成功！');
						}else{
							layer.msg('添加失败！');
						}
					},
					error:function(err){
						if(err.status==200 || err.status==204){
							layer.msg('添加成功！');
						}else{
							layer.msg('添加失败！');
						}
					},
					complete(){
						table.reload('currentTableId',{
							url: url+'/Acquisitions?cookie='+$.cookie('session')
						}, true)
					}
				})
			});
		});
	
	    table.on('tool(currentTableFilter)', function (obj) {
	        userinfo = obj.data;
	        if (obj.event === 'edit') {
				alert = layer.alert(`<div class="layui-form" style="margin-top: 30px;width: auto;">
					<div class="layui-form-item">
						<label class="layui-form-label" style="width: 60px !important;">工号</label>
						<div class="layui-input-block" style="margin-left: 90px !important;">
							<input type="number" name="工号" id="工号"lay-verify="number" lay-reqtext="工号不能为空" placeholder="请输入工号" value="" class="layui-input" >
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label" style="width: 60px !important;">用户类型</label>
						<div class="layui-input-block" style="margin-left: 90px !important;">
							<input type="text" name="用户类型" id="用户类型" lay-verify="required" lay-reqtext="用户类型不能为空" placeholder="请输入用户类型" value="" class="layui-input">
							<div style="color:#a29c9c;font-size:12px !important;">填写"用户"、"技术员"或"管理"</div>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label" style="width: 60px !important;">用户名</label>
						<div class="layui-input-block" style="margin-left: 90px !important;">
							<input type="text" name="用户名" id="用户名" lay-verify="required" lay-reqtext="用户名不能为空" placeholder="请输入用户名" value="" class="layui-input">
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label" style="width: 60px !important;">姓名</label>
						<div class="layui-input-block" style="margin-left: 90px !important;">
							<input type="text" name="名字" id="名字" lay-verify="required" lay-reqtext="姓名不能为空"  placeholder="请输入姓名" value="" class="layui-input">
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label" style="width: 60px !important;">手机号码</label>
						<div class="layui-input-block" style="margin-left: 90px !important;">
							<input type="number" name="电话号码" id="电话号码" lay-verify="phone" lay-reqtext="手机号码不能为空"  placeholder="请输入手机号码" value="" class="layui-input">
						</div>
					</div>
					
					<div class="layui-form-item">
						<label class="layui-form-label" style="width: 60px !important;">邮箱号码</label>
						<div class="layui-input-block" style="margin-left: 90px !important;">
							<input type="email" name="邮件" id="邮件" lay-verify="email" lay-reqtext="邮箱不能为空"  placeholder="请输入邮箱号码" value="" class="layui-input">
						</div>
					</div>

					<div class="layui-form-item">
						<div class="layui-input-block" style="margin-left: 0px !important;display: flex;justify-content: center;">
							<button class="layui-btn layui-btn-normal" lay-submit lay-filter="saveBtn">确认</button>
						</div>
					</div>
				</div>`
				, {
					area: ['100%', '100%'],
				    skin: 'layui-layer-lan',
				    closeBtn: 1,
					btn:[],
					title:"编辑数据",
					success(){
						$('#工号').val(userinfo['工号']);
						$('#用户类型').val(userinfo['角色']);
						$('#用户名').val(userinfo['用户名']);
						$('#名字').val(userinfo['名字']);
						$('#电话号码').val(userinfo['电话号码']);
						$('#邮件').val(userinfo['邮件']);
					}
				});
	            return false;
	        } else if (obj.event === 'delete') {
	            layer.confirm('请确认删除！', function (index) {
					$.ajax({
						type:"delete",
						url:url+"/Acquisitions",
						contentType:"json/application",
						dataType:"json",
						data:JSON.stringify({
							"cookie":session,
							"acquisitionsinfo":userinfo['采购号'].toString(),
						}),
						success:function(msg){
							if(msg.status==200){
								layer.msg("删除成功!");
							}else{
								layer.msg("删除失败!");
							}
						},
						error:function(err){
							if(err.status==200){
								layer.msg("删除成功!");
							}else{
								layer.msg("删除失败!");
							}
						},
						complete(){
							table.reload('currentTableId',{
								url: url+'/Acquisitions?cookie='+$.cookie('session')
							}, true)
							selectData = [];
						}
					})
	                layer.close(index);
	            });
	        }
	    });
	});
	
</script>

</body>
</html>
